<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Diario del Richi - Mis Metas y Logros</title>
    <meta name="description" content="Una bitácora simple para que Richi anote sus metas y celebre sus logros.">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <!-- Background Canvas for Confetti -->
    <canvas id="confetti-canvas"></canvas>

    <div class="app-container">
        <!-- HEADER -->
        <header class="main-header">
            <div class="logo-area">
                <div class="icon-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                </div>
                <div>
                    <h1>El Diario del Richi</h1>
                    <p class="subtitle">Mis Metas y Logros de Vida</p>
                </div>
            </div>
            <!-- Simple Progress Stats -->
            <div class="progress-simple">
                <span id="progress-text">0 de 0 logrados</span>
                <div class="mini-bar">
                    <div class="mini-bar-fill" id="progress-bar-fill" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <!-- ADD GOAL INPUT SECTION -->
        <section class="add-goal-section">
            <form id="quick-add-form" class="quick-add-form">
                <div class="input-wrapper">
                    <input type="text" id="goal-input" placeholder="Escribe aquí un sueño, viaje o meta..." required autocomplete="off">
                    
                    <!-- Color theme selector inside the input area for ease -->
                    <div class="color-picker-simple">
                        <label class="color-dot theme-purple" title="Púrpura">
                            <input type="radio" name="goal-theme" value="theme-purple" checked>
                            <span></span>
                        </label>
                        <label class="color-dot theme-blue" title="Azul">
                            <input type="radio" name="goal-theme" value="theme-blue">
                            <span></span>
                        </label>
                        <label class="color-dot theme-green" title="Verde">
                            <input type="radio" name="goal-theme" value="theme-green">
                            <span></span>
                        </label>
                        <label class="color-dot theme-rose" title="Rosa">
                            <input type="radio" name="goal-theme" value="theme-rose">
                            <span></span>
                        </label>
                        <label class="color-dot theme-amber" title="Ámbar">
                            <input type="radio" name="goal-theme" value="theme-amber">
                            <span></span>
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-add">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Añadir Meta
                </button>
            </form>
        </section>

        <!-- KANBAN BOARD -->
        <main class="kanban-board">
            <!-- COLUMN 1: TO DO (METAS) -->
            <div class="kanban-column" id="col-todo">
                <div class="column-header">
                    <div class="column-title-wrapper">
                        <span class="column-emoji">✈️</span>
                        <h2>Mis Metas</h2>
                    </div>
                    <span class="column-badge" id="badge-todo">0</span>
                </div>
                <div class="cards-list" id="todo-list">
                    <!-- Dynamic metas cards here -->
                </div>
            </div>

            <!-- COLUMN 2: DONE (LOGROS) -->
            <div class="kanban-column" id="col-done">
                <div class="column-header">
                    <div class="column-title-wrapper">
                        <span class="column-emoji">🌟</span>
                        <h2>Mis Logros</h2>
                    </div>
                    <span class="column-badge" id="badge-done">0</span>
                </div>
                <div class="cards-list" id="done-list">
                    <!-- Dynamic logros cards here -->
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="main-footer">
            <p>Hecho con ❤️ para Richi. Escribe tus metas, disfrútalas y celébralas.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
