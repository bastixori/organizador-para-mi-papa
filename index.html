<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Diario del Richi - Mis Metas y Logros</title>
    <meta name="description" content="Una bitácora simple tipo Kanban para que Richi mueva sus metas de 'Por Vivir' a 'Logrado'.">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <!-- Background Canvas for Confetti -->
    <canvas id="confetti-canvas"></canvas>

    <div class="app-container">
        <!-- HEADER -->
        <header class="main-header">
            <div class="logo-area">
                <div class="icon-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                </div>
                <div>
                    <h1>El Diario del Richi</h1>
                    <p class="subtitle">Mi Tablero de Metas y Logros</p>
                </div>
            </div>
            
            <!-- Header Actions -->
            <div class="header-right">
                <button type="button" id="btn-music" class="music-btn" title="Activar/Silenciar música de fondo">🔇</button>
                <div class="counter-badge" id="progress-counter">
                    0 de 0 logrados
                </div>
            </div>
        </header>

        <!-- ADD GOAL INPUT -->
        <section class="add-section">
            <form id="add-form" class="add-form">
                <input type="text" id="goal-input" placeholder="Escribe aquí un nuevo sueño o meta..." required autocomplete="off">
                <button type="submit" class="btn btn-add">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Añadir
                </button>
            </form>
        </section>

        <!-- KANBAN BOARD -->
        <main class="kanban-board">
            <!-- COLUMN 1: TO DO (METAS) -->
            <div class="kanban-column" id="col-todo">
                <div class="column-header">
                    <div class="column-title-wrapper">
                        <span class="column-emoji">✈️</span>
                        <h2>Por Vivir</h2>
                    </div>
                    <span class="column-badge" id="badge-todo">0</span>
                </div>
                <div class="cards-list" id="todo-list">
                    <!-- Metas here -->
                </div>
            </div>

            <!-- COLUMN 2: DONE (LOGROS) -->
            <div class="kanban-column" id="col-done">
                <div class="column-header">
                    <div class="column-title-wrapper">
                        <span class="column-emoji">🌟</span>
                        <h2>Logrado!</h2>
                    </div>
                    <span class="column-badge" id="badge-done">0</span>
                </div>
                <div class="cards-list" id="done-list">
                    <!-- Logros here -->
                </div>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="main-footer">
            <p>Hecho con ❤️ para Richi • ¡Disfruta cada paso del camino!</p>
        </footer>
    </div>

    <audio id="bg-music" loop src="https://assets.mixkit.co/music/preview/mixkit-serene-view-1002.mp3"></audio>
    <script src="app.js"></script>
</body>
</html>
