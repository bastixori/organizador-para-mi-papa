<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Diario del Richi - Mis Metas</title>
    <meta name="description" content="Una bitácora súper simple para que Richi anote sus metas y las marque al cumplirlas.">
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <!-- Background Canvas for Confetti -->
    <canvas id="confetti-canvas"></canvas>

    <div class="app-container">
        <!-- HEADER -->
        <header class="main-header">
            <div class="logo-area">
                <div class="icon-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <div>
                    <h1>El Diario del Richi</h1>
                    <p class="subtitle">Mis Sueños y Metas de Vida</p>
                </div>
            </div>
            
            <!-- Simple Counter -->
            <div class="counter-badge" id="progress-counter">
                0 de 0 logrados
            </div>
        </header>

        <!-- ADD GOAL INPUT -->
        <section class="add-section">
            <form id="add-form" class="add-form">
                <input type="text" id="goal-input" placeholder="Escribe aquí un sueño o meta..." required autocomplete="off">
                <button type="submit" class="btn btn-add">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Añadir
                </button>
            </form>
        </section>

        <!-- GOALS LIST -->
        <main class="goals-list-container">
            <div id="goals-list" class="goals-list">
                <!-- List items will be injected here -->
            </div>
            
            <!-- Empty state -->
            <div class="empty-state" id="empty-state">
                <span class="empty-emoji">✨</span>
                <p>No tienes metas anotadas todavía. ¡Escribe una arriba!</p>
            </div>
        </main>

        <!-- FOOTER -->
        <footer class="main-footer">
            <p>Hecho con ❤️ para Richi • ¡Disfruta cada logro!</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
